spring.application.name=gestao-contas-pagar

# Datasource - use environment variables provided by docker-compose or defaults for local dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gestao}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway will run on startup (no migrations present is OK). If you prefer relying on Hibernate DDL, set the env var to false.
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}

# RabbitMQ - use environment variables
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Remover warning do JPA
spring.jpa.open-in-view=false

# Server port
server.port=${SERVER_PORT:8080}

